<html lang="en">

    <title>Adopt It - Adoption Form</title>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/Saaim/adoption_form.css">
    
  </head>
  <body>
    <header>
      <a href="homepage.html">
        <img src="images/Logo/logo_with_text_transparent.png" alt="Adopt It Logo" class="header-logo" />
      </a>
      <div class="header-right">
        <a href="profile_page.html">User Profile</a>
      </div>
    </header>
    <nav>
      <ul>
        <li><a href="browser_page.html">Browser Page</a></li>
        <li><a href="adoption_form.html">Adoption Form</a></li>
        <li><a href="contact_us.html">Contact Us</a></li>
      </ul>
    </nav>
      <main class="container adoption-page">
        <section class="application-form-section">
            <h2>Adoption Application Form</h2>
            <p>Please complete this form to apply for adopting a pet.</p>

           <form class="adoption-form" action="scripts/submit-form.php" method="POST">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="pet">Pet You Want to Adopt:</label>
                <select id="pet" name="pet">
                    <option value="dog">Dog</option>
                    <option value="cat">Cat</option>
                    <option value="rabbit">Rabbit</option>
                </select>

                <label for="experience">Previous Pet Experience:</label>
                <textarea id="experience" name="experience" rows="5"></textarea>

                <button type="submit">Submit Application</button>
           </form>
        </section>
      </main>
    <footer>
      <p>© 2026 Adopt It Adoptions</p>
    </footer>

    <script src="scripts/Saaim/adoption_form.js"></script>
  </body>
</html>
